<script>
  (function () {
    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

    // Scroll progress bar
    var bar = document.createElement("div");
    bar.id = "scroll-progress";
    document.body.appendChild(bar);

    function updateProgress() {
      var doc = document.documentElement;
      var scrollTop = doc.scrollTop || document.body.scrollTop;
      var height = doc.scrollHeight - doc.clientHeight;
      var pct = height > 0 ? (scrollTop / height) * 100 : 0;
      bar.style.width = pct + "%";
    }

    window.addEventListener("scroll", updateProgress, { passive: true });
    updateProgress();

    // Reveal content blocks on scroll
    var targets = document.querySelectorAll(
      "#body-inner > h2, #body-inner > h3, #body-inner > p, #body-inner > ul, #body-inner > ol, #body-inner > table, #body-inner > blockquote, #body-inner > pre, #body-inner > img, #body-inner > div"
    );

    targets.forEach(function (el, i) {
      el.classList.add("reveal-on-scroll");
      el.style.transitionDelay = Math.min(i * 0.04, 0.35) + "s";
    });

    if ("IntersectionObserver" in window) {
      var observer = new IntersectionObserver(
        function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              observer.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.08, rootMargin: "0px 0px -40px 0px" }
      );

      targets.forEach(function (el) {
        observer.observe(el);
      });
    } else {
      targets.forEach(function (el) {
        el.classList.add("is-visible");
      });
    }
  })();
</script>
